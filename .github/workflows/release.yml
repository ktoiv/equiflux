name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  cli:
    name: Build CLI binaries
    strategy:
      matrix:
        include:
          - target: bun-linux-x64-modern
            out: equiflux-linux-x64
          - target: bun-linux-arm64
            out: equiflux-linux-arm64
          - target: bun-darwin-x64
            out: equiflux-darwin-x64
          - target: bun-darwin-arm64
            out: equiflux-darwin-arm64
          - target: bun-windows-x64-modern
            out: equiflux-win-x64.exe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun build src/bun/cli.ts --compile --target=${{ matrix.target }} --outfile=${{ matrix.out }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: ${{ matrix.out }}

  desktop-linux:
    name: Build desktop app (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build:canary
      - uses: actions/upload-artifact@v4
        with:
          name: equiflux-desktop-linux-x64
          path: build/

  release:
    name: Create release
    needs: [cli, desktop-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: equiflux-*
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: equiflux-desktop-linux-x64
          path: equiflux-desktop-linux-x64
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            equiflux-linux-x64
            equiflux-linux-arm64
            equiflux-darwin-x64
            equiflux-darwin-arm64
            equiflux-win-x64.exe
            equiflux-desktop-linux-x64/**
          generate_release_notes: true
