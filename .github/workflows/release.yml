name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  cli:
    name: Build CLI (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: bun-linux-x64-modern
            out: equiflux-linux-x64
          - target: bun-linux-arm64
            out: equiflux-linux-arm64
          - target: bun-darwin-x64
            out: equiflux-darwin-x64
          - target: bun-darwin-arm64
            out: equiflux-darwin-arm64
          - target: bun-windows-x64-modern
            out: equiflux-win-x64.exe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun build src/bun/cli.ts --compile --target=${{ matrix.target }} --outfile=${{ matrix.out }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: ${{ matrix.out }}

  desktop-linux:
    name: Build desktop (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build:canary
      - run: tar -cJf equiflux-desktop-linux-x64.tar.zst -C build .
      - uses: actions/upload-artifact@v4
        with:
          name: equiflux-desktop-linux-x64
          path: equiflux-desktop-linux-x64.tar.zst

  desktop-macos:
    name: Build desktop (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build:canary
      - run: ditto -c -k --keepParent build equiflux-desktop-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: equiflux-desktop-macos
          path: equiflux-desktop-macos.zip

  desktop-windows:
    name: Build desktop (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build:canary
        shell: bash
      - run: powershell Compress-Archive -Path build/* -DestinationPath equiflux-desktop-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: equiflux-desktop-windows-x64
          path: equiflux-desktop-windows-x64.zip

  release:
    name: Create release
    needs: [cli, desktop-linux, desktop-macos, desktop-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: equiflux-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            equiflux-linux-x64
            equiflux-linux-arm64
            equiflux-darwin-x64
            equiflux-darwin-arm64
            equiflux-win-x64.exe
            equiflux-desktop-linux-x64.tar.zst
            equiflux-desktop-macos.zip
            equiflux-desktop-windows-x64.zip
          generate_release_notes: true
